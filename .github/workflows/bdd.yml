name: Playwright-Cucumber BDD

on:
  push:
    branches: [ main, feature/* ]
  pull_request:

jobs:
  run-bdd:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Check secrets availability
        run: |
          if [ -z "${{ secrets.BASE_URL }}" ]; then
            echo "::error::BASE_URL secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.USER_EMAIL }}" ]; then
            echo "::error::USER_EMAIL secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.USER_PASSWORD }}" ]; then
            echo "::error::USER_PASSWORD secret is not set"
            exit 1
          fi

      - name: Create .env from secrets
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" > .env
          echo "USER_EMAIL=${{ secrets.USER_EMAIL }}" >> .env
          echo "USER_PASSWORD=${{ secrets.USER_PASSWORD }}" >> .env
          
      - name: Build Cucumber
        run: npm run bdd:build
        
      - name: Run Cucumber BDD tests
        run: npm run bdd:run
        id: bdd-test
        continue-on-error: true
        
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            reports/cucumber-report.html
            playwright-report/
            test-results/
            reports/html/
          retention-days: 30
          
      - name: Check test results
        if: steps.bdd-test.outcome == 'failure'
        run: exit 1